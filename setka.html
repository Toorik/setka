<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flow Free</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg: #080810;
  --s1: #10101c;
  --s2: #18182a;
  --s3: #22223a;
  --border: #2e2e4a;
  --text: #eeeef8;
  --muted: #6666aa;
  --accent: #6c63ff;
  --accent2: #ff4fa3;
  --green: #3dffa0;
  --tr: .38s cubic-bezier(.7,0,.3,1);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
html,body { height:100dvh; overflow:hidden; background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; }

#app { height:100dvh; display:flex; flex-direction:column; position:relative; overflow:hidden; }

nav {
  flex-shrink:0; display:flex;
  background:var(--s1); border-bottom:1px solid var(--border);
  position:relative; z-index:10;
}
.nb {
  flex:1; padding:12px 4px 10px;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  cursor:pointer; border:none; background:none; color:var(--muted);
  font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.5px;
  text-transform:uppercase; transition:color .2s; user-select:none;
}
.nb svg { width:20px; height:20px; }
.nb.on { color:var(--text); }
.nav-ink {
  position:absolute; bottom:0; left:0; height:2px;
  background:var(--accent); width:33.33%; border-radius:1px 1px 0 0;
  transition:transform var(--tr); will-change:transform;
}

.screens { flex:1; position:relative; overflow:hidden; }
.scr {
  position:absolute; inset:0; display:flex; flex-direction:column;
  overflow:hidden; will-change:transform,opacity;
  transform:translateX(100%); opacity:0; pointer-events:none;
  transition:transform var(--tr), opacity var(--tr);
}
.scr.active { transform:translateX(0); opacity:1; pointer-events:all; }

.s-body { flex:1; overflow-y:auto; overflow-x:hidden; overscroll-behavior:contain; }
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.toolbar {
  flex-shrink:0; background:var(--s1); border-bottom:1px solid var(--border);
  padding:9px 11px; display:flex; flex-direction:column; gap:7px;
}
.trow { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
.tl { font-size:9px; letter-spacing:1px; color:var(--muted); text-transform:uppercase; white-space:nowrap; margin-right:2px; }

.szb {
  padding:4px 8px; font-size:11px; font-family:'JetBrains Mono',monospace;
  background:var(--s2); border:1px solid var(--border); border-radius:4px;
  color:var(--muted); cursor:pointer; transition:all .14s;
}
.szb.on { background:var(--accent); border-color:var(--accent); color:#fff; }

.cdot {
  width:25px; height:25px; border-radius:50%; cursor:pointer; flex-shrink:0;
  border:2px solid transparent; transition:transform .14s, border-color .14s;
}
.cdot.on { border-color:#fff; transform:scale(1.2); }

.tb {
  padding:4px 9px; font-size:10px; font-family:'JetBrains Mono',monospace;
  background:var(--s2); border:1px solid var(--border); border-radius:4px;
  color:var(--muted); cursor:pointer; transition:all .14s; white-space:nowrap;
}
.tb:active { opacity:.75; }
.tb.danger { border-color:var(--accent2); color:var(--accent2); }
.tb.hi { background:var(--accent); border-color:var(--accent); color:#fff; }

.bwrap { flex:1; display:flex; align-items:center; justify-content:center; padding:12px; min-height:0; }
.board {
  display:inline-grid; gap:2px;
  background:var(--border); border:2px solid var(--border);
  border-radius:10px; overflow:hidden; touch-action:none;
}
.cell {
  background:var(--s2); display:flex; align-items:center; justify-content:center;
  position:relative; cursor:pointer; aspect-ratio:1/1;
  container-type:size; touch-action:none;
}
.dc {
  position:absolute; z-index:2; pointer-events:none;
  width:min(58cqw,58cqh); height:min(58cqw,58cqh);
  border-radius:50%;
  box-shadow:0 0 0 3px rgba(255,255,255,.12) inset;
}
.dc.glow { box-shadow:0 0 10px 2px var(--gc), 0 0 0 3px rgba(255,255,255,.15) inset; }
.psv {
  position:absolute; inset:0; width:100%; height:100%;
  pointer-events:none; z-index:1; overflow:visible;
}

.bar {
  flex-shrink:0; background:var(--s1); border-top:1px solid var(--border);
  padding:7px 10px; display:flex; gap:5px; flex-wrap:wrap;
}

.lvh {
  flex-shrink:0; padding:9px 11px; background:var(--s1);
  border-bottom:1px solid var(--border); display:flex; gap:7px;
}
.lv-list { padding:9px 11px; display:flex; flex-direction:column; gap:7px; }
.lvi {
  background:var(--s1); border:1px solid var(--border); border-radius:10px;
  padding:11px 13px; display:flex; align-items:center; gap:11px;
  transition:border-color .14s;
}
.lvi:active { background:var(--s2); }
.lvn { font-family:'Unbounded',sans-serif; font-size:13px; }
.lvm { font-size:10px; color:var(--muted); margin-top:3px; }
.lvr { font-size:10px; color:var(--green); margin-top:3px; }
.lva { display:flex; flex-direction:column; gap:4px; align-items:flex-end; flex-shrink:0; }
.pbtn {
  padding:7px 15px; background:var(--accent); border:none; border-radius:6px;
  color:#fff; font-family:'Unbounded',sans-serif; font-size:12px; cursor:pointer;
}
.pbtn:active { opacity:.8; }
.empty {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:11px; color:var(--muted); padding:40px 20px; text-align:center;
}
.ei { font-size:44px; opacity:.3; }
.et { font-size:12px; line-height:1.9; }

.hud {
  flex-shrink:0; background:var(--s1); border-bottom:1px solid var(--border);
  padding:9px 15px; display:flex; align-items:center; justify-content:space-between;
}
.hs { text-align:center; }
.hl { font-size:9px; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; }
.hv { font-family:'Unbounded',sans-serif; font-size:20px; font-weight:700; line-height:1.1; margin-top:2px; }
.hv.clk { color:var(--accent); }
.hv.warn { color:#ffb347; animation:blk .6s infinite alternate; }
.hv.dang { color:var(--accent2); animation:blk .32s infinite alternate; }
@keyframes blk { to { opacity:.25; } }
.rstb {
  padding:7px 13px; background:transparent; border:1px solid var(--border);
  border-radius:6px; color:var(--muted); font-family:'JetBrains Mono',monospace;
  font-size:13px; cursor:pointer; transition:all .14s;
}
.rstb:active { border-color:var(--accent2); color:var(--accent2); }

.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.88);
  display:flex; align-items:center; justify-content:center;
  z-index:200; backdrop-filter:blur(6px); animation:fI .25s;
}
@keyframes fI { from { opacity:0; } }
.wc {
  background:var(--s1); border:1px solid var(--accent); border-radius:20px;
  padding:30px 26px; text-align:center; max-width:288px; width:90%;
  animation:sU .32s cubic-bezier(.3,1.4,.5,1);
}
@keyframes sU { from { transform:translateY(36px) scale(.92); opacity:0; } }
.wi  { font-size:50px; margin-bottom:9px; }
.wh  { font-family:'Unbounded',sans-serif; font-size:24px; font-weight:900; }
.wt  { font-family:'Unbounded',sans-serif; font-size:38px; color:var(--accent); margin:6px 0; }
.wr  { font-size:11px; color:var(--green); min-height:16px; margin-bottom:18px; }
.wbs { display:flex; gap:9px; justify-content:center; }
.wb {
  padding:10px 20px; border-radius:9px; font-family:'Unbounded',sans-serif;
  font-size:12px; cursor:pointer; border:none; transition:opacity .14s;
}
.wb:active { opacity:.75; }
.wp { background:var(--accent); color:#fff; }
.ws { background:var(--s2); color:var(--text); border:1px solid var(--border); }

.dn { display:none!important; }
#fi1,#fi2 { display:none; }

.gmc {
  background:var(--s1);
  width:100vw; height:100dvh;
  display:flex; flex-direction:column; overflow:hidden;
}
.gmhud {
  flex-shrink:0; padding:10px 14px; display:flex; align-items:center;
  justify-content:space-between; gap:6px;
  border-bottom:1px solid var(--border); background:var(--s2);
}
.gmbwrap {
  flex:1; display:flex; align-items:center; justify-content:center;
  padding:10px; min-height:0; overflow:hidden; touch-action:none;
}
.gmbwrap .board {
  width:min(calc(100vw - 20px), calc(100dvh - 76px));
  height:min(calc(100vw - 20px), calc(100dvh - 76px));
}
#sc0 .board {
  width:min(calc(100vw - 24px), calc(100dvh - 200px));
  height:min(calc(100vw - 24px), calc(100dvh - 200px));
}
</style>
</head>
<body>
<div id="app">

<nav style="display:none">
  <button class="nb on" onclick="go(0)" id="nb0">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Редактор
  </button>
  <button class="nb" onclick="go(2)" id="nb2">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5,3 19,12 5,21"/></svg>
    Игра
  </button>
  <div class="nav-ink" id="ink"></div>
</nav>

<div class="screens">
  <div class="scr active" id="sc0">
    <div class="toolbar">
      <div class="trow">
        <span class="tl">Размер</span>
        <div id="szw" style="display:flex;gap:4px;flex-wrap:wrap"></div>
      </div>
      <div class="trow">
        <span class="tl">Цвет</span>
        <div id="cpal" style="display:flex;gap:4px;flex-wrap:wrap"></div>
        <div style="width:1px;background:var(--border);margin:0 3px;align-self:stretch"></div>
        <button class="tb" id="erase-btn" onclick="toggleErase()">✕ Стереть</button>
      </div>
    </div>
    <div class="bwrap"><div class="board" id="edb"></div></div>
    <div class="bar">
      <button class="tb danger" onclick="edClear()">🗑 Очистить</button>
      <button class="tb hi" onclick="testPlay()">▶ Тест!</button>
    </div>
  </div>
</div>

</div>

<!-- GAME MODAL -->
<div class="overlay dn" id="gmod">
  <div class="gmc">
    <div class="gmhud">
      <div class="hs"><div class="hl">Уровень</div><div class="hv" id="hn" style="font-size:11px;font-family:'JetBrains Mono',monospace;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">—</div></div>
      <div class="hs"><div class="hl">Время</div><div class="hv clk" id="ht">0.0</div></div>
      <div class="hs"><div class="hl">Заполнено</div><div class="hv" id="hf" style="font-size:14px">0%</div></div>
      <button class="rstb" onclick="resetGame()">↺</button>
      <button class="rstb" onclick="closeGame()" style="color:var(--accent2);border-color:var(--accent2)">✕</button>
    </div>
    <div class="gmbwrap"><div class="board" id="gmb"></div></div>
  </div>
</div>

<!-- WIN OVERLAY -->
<div class="overlay dn" id="wov">
  <div class="wc">
    <div class="wi">🎉</div>
    <div class="wh">РЕШЕНО!</div>
    <div class="wt" id="wtm"></div>
    <div class="wr" id="wrec"></div>
    <div class="wbs">
      <button class="wb ws" onclick="closeWin()">✕ Закрыть</button>
      <button class="wb wp" onclick="resetGame()">↺ Снова</button>
    </div>
  </div>
</div>

<script>
if (window.Telegram?.WebApp) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); }

const COLS=[
  {id:'red',h:'#ff4757'},{id:'blue',h:'#1e90ff'},{id:'green',h:'#2ed573'},
  {id:'yellow',h:'#ffd32a'},{id:'orange',h:'#ff6348'},{id:'pink',h:'#ff6b9d'},
  {id:'purple',h:'#a29bfe'},{id:'cyan',h:'#00d2d3'},{id:'lime',h:'#badc58'},
  {id:'brown',h:'#cd853f'},{id:'white',h:'#dfe6e9'},{id:'teal',h:'#00b894'},
];
const CH={}; COLS.forEach(c=>CH[c.id]=c.h);

let cur=0;
function go(idx){}

// ═══════════════ EDITOR ═══════════════
let edSz=7, edG={}, selC='red', erasing=false, edDrag=false;

function buildSz(){
  const w=document.getElementById('szw'); w.innerHTML='';
  [5,6,7,8,9,10,11,12].forEach(s=>{
    const b=document.createElement('button');
    b.className='szb'+(s===edSz?' on':''); b.textContent=s+'×'+s;
    b.onclick=()=>{edSz=s;edG={};buildSz();buildEdB();};
    w.appendChild(b);
  });
}

function buildPal(){
  const p=document.getElementById('cpal'); p.innerHTML='';
  COLS.forEach(c=>{
    const d=document.createElement('div');
    d.className='cdot'+(c.id===selC&&!erasing?' on':'');
    d.style.background=c.h;
    d.onclick=()=>{selC=c.id;erasing=false;rPal();};
    p.appendChild(d);
  });
}
function rPal(){
  document.querySelectorAll('.cdot').forEach((d,i)=>d.classList.toggle('on',COLS[i].id===selC&&!erasing));
  document.getElementById('erase-btn').classList.toggle('danger',erasing);
}
function toggleErase(){erasing=!erasing;if(erasing)selC=null;rPal();}

function buildEdB(){
  const b=document.getElementById('edb');
  b.style.gridTemplateColumns=`repeat(${edSz},1fr)`;
  b.style.gridTemplateRows=`repeat(${edSz},1fr)`; b.innerHTML='';
  for(let r=0;r<edSz;r++) for(let c=0;c<edSz;c++){
    const el=document.createElement('div');
    el.className='cell'; el.dataset.r=r; el.dataset.c=c;
    el.addEventListener('pointerdown',edDn);
    el.addEventListener('pointerenter',edEn);
    b.appendChild(el);
  }
  rEdB();
}
document.addEventListener('pointerup',()=>edDrag=false);

function edDn(e){e.preventDefault();edDrag=true;paint(+e.currentTarget.dataset.r,+e.currentTarget.dataset.c);}
function edEn(e){if(!edDrag)return;paint(+e.currentTarget.dataset.r,+e.currentTarget.dataset.c);}

function paint(r,c){
  const k=r+','+c;
  if(erasing||!selC){delete edG[k];}
  else{edG[k]=edG[k]===selC?(delete edG[k],undefined):selC;}
  rEdB();
}

function rEdB(){
  document.querySelectorAll('#edb .cell').forEach(el=>{
    const k=el.dataset.r+','+el.dataset.c; el.innerHTML='';
    const col=edG[k];
    if(col){const d=document.createElement('div');d.className='dc';d.style.background=CH[col];el.appendChild(d);}
  });
}

function edClear(){if(confirm('Очистить поле?')){edG={};rEdB();}}

let sRecs={};

function validate(){
  const cnt={};
  Object.values(edG).forEach(c=>cnt[c]=(cnt[c]||0)+1);
  const bad=Object.entries(cnt).filter(([,v])=>v<2);
  if(bad.length){alert('Каждый цвет — ровно 2 точки!\nПроблема: '+bad.map(b=>b[0]).join(', '));return false;}
  if(Object.keys(cnt).length<2){alert('Нужно минимум 2 пары!');return false;}
  return true;
}

function testPlay(){
  if(!validate()) return;
  loadGame({id:'__test__',name:'Тест',size:edSz,dots:{...edG}});
  openGame();
}

// ═══════════════ GAME ═══════════════
let gLv=null,gDots={},gGr={},gPaths={};
let gAct=null,gDraw=false,gOv=false;
let clkInt=null,tSt=0,el=0;

function loadGame(lv){
  stopClock();el=0;gOv=false;
  gLv=lv;gDots={...lv.dots};gGr={};gPaths={};
  [...new Set(Object.values(gDots))].forEach(c=>gPaths[c]=[]);
  gAct=null;gDraw=false;
  document.getElementById('hn').textContent=lv.name;
  updFill();buildGmB();startClock();
}

function openGame(){
  document.getElementById('gmod').classList.remove('dn');
}

function closeGame(){
  stopClock();
  document.getElementById('gmod').classList.add('dn');
  document.getElementById('wov').classList.add('dn');
  gLv=null; gDraw=false; gAct=null;
}

function buildGmB(){
  const b=document.getElementById('gmb'),sz=gLv.size;
  b.style.gridTemplateColumns=`repeat(${sz},1fr)`;
  b.style.gridTemplateRows=`repeat(${sz},1fr)`;
  b.innerHTML='';
  for(let r=0;r<sz;r++) for(let c=0;c<sz;c++){
    const el=document.createElement('div');
    el.className='cell';el.dataset.r=r;el.dataset.c=c;
    b.appendChild(el);
  }

  const board=document.getElementById('gmb');
  // Используем pointer events для лучшей поддержки тач-интерфейсов
  board.addEventListener('pointerdown', onPD);
  board.addEventListener('pointermove', onPM);
  window.addEventListener('pointerup', onPU);
  
  rGm();
}

function cellAt(x,y){
  const el=document.elementFromPoint(x,y);
  if(!el) return null;
  return el.closest('.cell');
}

function onPD(e){
  if(gOv) return;
  const c = cellAt(e.clientX, e.clientY);
  if(c){
    gDraw = true;
    startCell(c);
  }
}

function onPM(e){
  if(!gDraw || !gAct || gOv) return;
  const c = cellAt(e.clientX, e.clientY);
  if(c) moveCell(c);
}

function onPU(){
  gDraw = false;
  // Мы НЕ обнуляем gAct, чтобы можно было продолжить
}

function startCell(el){
  const r=+el.dataset.r, c=+el.dataset.c, k=r+','+c;
  const dotCol = gDots[k]; // Цвет точки, если это стартовая/конечная
  const pathCol = gGr[k];  // Цвет пути в этой клетке
  const col = dotCol || pathCol;

  if(!col) {
    gAct = null;
    return;
  }

  gAct = col;
  const path = gPaths[col];
  const idx = path.indexOf(k);

  // Если нажали на существующий путь, обрезаем его до этой точки, чтобы продолжить рисовать
  if(idx !== -1){
    const toRemove = path.splice(idx + 1);
    toRemove.forEach(rk => {
      if(gGr[rk] === col && !gDots[rk]) delete gGr[rk];
    });
  } else {
    // Если нажали на точку, у которой еще нет пути, или на чужой путь
    if(dotCol){
      clrPath(dotCol);
      gPaths[dotCol] = [k];
      gGr[k] = dotCol;
    }
  }
  
  rGm();
  updFill();
}

function moveCell(el){
  if(!gAct) return;
  const r=+el.dataset.r, c=+el.dataset.c, k=r+','+c;
  const path=gPaths[gAct], last=path[path.length-1];
  
  if(!last || !adj(last,k)) return;
  
  // Если возвращаемся назад по своему пути — "отменяем" шаг
  if(path.length >= 2 && path[path.length-2] === k){
    const rem = path.pop();
    if(!gDots[rem]) delete gGr[rem];
    rGm(); updFill(); return;
  }

  // Если наступили на свой же путь в другом месте — ничего не делаем (защита от петель)
  if(path.includes(k)) return;

  // Если наступили на чужой путь — стираем его
  if(gGr[k] && gGr[k] !== gAct){
    if(gDots[k] && gDots[k] !== gAct) return; // Нельзя затирать чужие стартовые точки
    clrPath(gGr[k]);
  }

  path.push(k);
  gGr[k] = gAct;
  rGm();
  updFill();

  // Если дошли до второй точки того же цвета
  if(gDots[k] === gAct && k !== path[0]){
    gDraw = false;
    checkWin();
  }
}

function clrPath(col){
  if(!gPaths[col]) return;
  gPaths[col].forEach(k => { if(gGr[k] === col) delete gGr[k]; });
  gPaths[col] = [];
}

function adj(a,b){
  const [r1,c1]=a.split(',').map(Number);
  const [r2,c2]=b.split(',').map(Number);
  return Math.abs(r1-r2)+Math.abs(c1-c2) === 1;
}

function rGm(){
  document.querySelectorAll('#gmb .cell').forEach(cell=>{
    const r=+cell.dataset.r, c=+cell.dataset.c, k=r+','+c;
    const col=gGr[k], dot=gDots[k];
    cell.innerHTML=''; cell.style.background='';
    if(col){
      if(!dot) cell.style.background=CH[col]+'28';
      const svg=mkPipe(r,c,col,CH[col]);
      if(svg) cell.appendChild(svg);
    }
    if(dot){
      const d=document.createElement('div'); d.className='dc'; d.style.background=CH[dot];
      const p=gPaths[dot]||[];
      // Проверка на завершенность линии для свечения
      if(p.length>=2 && gDots[p[0]]===dot && gDots[p[p.length-1]]===dot && p[0]!==p[p.length-1]){
        d.classList.add('glow'); d.style.setProperty('--gc',CH[dot]+'99');
      }
      cell.appendChild(d);
    }
  });
}

function mkPipe(r,c,col,hex){
  const k=r+','+c, path=gPaths[col]||[], idx=path.indexOf(k);
  if(idx===-1) return null;
  const prev=idx>0?path[idx-1]:null, next=idx<path.length-1?path[idx+1]:null;
  const D=[];
  [prev,next].forEach(nb=>{
    if(!nb)return; const[nr,nc]=nb.split(',').map(Number);
    if(nr===r-1)D.push('U'); if(nr===r+1)D.push('D');
    if(nc===c-1)D.push('L'); if(nc===c+1)D.push('R');
  });
  if(!D.length) return null;
  const has=d=>D.includes(d), M=22, W=10;
  let s='';
  if(has('L')&&has('R')) s+=`<rect x="0" y="${M-W/2}" width="44" height="${W}" fill="${hex}"/>`;
  else if(has('L')) s+=`<rect x="0" y="${M-W/2}" width="${M}" height="${W}" fill="${hex}"/>`;
  else if(has('R')) s+=`<rect x="${M}" y="${M-W/2}" width="${M}" height="${W}" fill="${hex}"/>`;
  if(has('U')&&has('D')) s+=`<rect x="${M-W/2}" y="0" width="${W}" height="44" fill="${hex}"/>`;
  else if(has('U')) s+=`<rect x="${M-W/2}" y="0" width="${W}" height="${M}" fill="${hex}"/>`;
  else if(has('D')) s+=`<rect x="${M-W/2}" y="${M}" width="${W}" height="${M}" fill="${hex}"/>`;
  if((has('L')||has('R'))&&(has('U')||has('D'))) s+=`<rect x="${M-W/2}" y="${M-W/2}" width="${W}" height="${W}" fill="${hex}"/>`;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 44 44'); svg.className='psv'; svg.innerHTML=s;
  return svg;
}

function updFill(){
  if(!gLv)return;
  const filled = Object.keys(gGr).length;
  const total = gLv.size * gLv.size;
  document.getElementById('hf').textContent=Math.round((filled/total)*100)+'%';
}

function checkWin(){
  if(!gLv)return;
  if(Object.keys(gGr).length < gLv.size*gLv.size) return;
  const cols=[...new Set(Object.values(gDots))];
  for(const c of cols){
    const p=gPaths[c]||[];
    if(p.length<2) return;
    const heads = Object.entries(gDots).filter(([k,v])=>v===c).map(([k])=>k);
    if(!heads.includes(p[0]) || !heads.includes(p[p.length-1])) return;
  }
  stopClock(); gOv=true;
  document.getElementById('wtm').textContent=el.toFixed(1)+'s';
  document.getElementById('wov').classList.remove('dn');
}

function resetGame(){ closeWin(); if(gLv) loadGame(gLv); }
function closeWin(){ document.getElementById('wov').classList.add('dn'); }

function startClock(){
  stopClock(); tSt=performance.now()-el*1000;
  clkInt=setInterval(()=>{
    el=(performance.now()-tSt)/1000;
    const ht=document.getElementById('ht');
    ht.textContent=el.toFixed(1);
    ht.className='hv clk'+(el>60?' dang':el>30?' warn':'');
  },100);
}
function stopClock(){ if(clkInt){clearInterval(clkInt);clkInt=null;} }

buildSz(); buildPal(); buildEdB();
</script>
